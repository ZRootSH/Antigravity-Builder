services:
  # Servicio A: Constructor y administrador del repositorio RPM (RHEL/Fedora + FPM + createrepo_c)
  repo-builder:
    build:
      context: .
      dockerfile: Dockerfile.repo
    container_name: antigravity-repo-builder
    restart: "no" # Se ejecuta bajo demanda o mediante cron/webhook en Dokploy
    environment:
      - APP_NAME=antigravity-ide
      - APP_VERSION=${version:-2.1.1}
      - APP_ITERATION=1
      - TAR_URL=${release:-https://storage.googleapis.com/antigravity-public/antigravity-hub/2.2.1-5287492581195776/linux-x64/Antigravity.tar.gz}
      - REPO_DIR=/var/www/repo
      - ARCH=${arch:-x86_64}
      - DOMAIN=${domain:-antigravity.zrootsh.com}
    volumes:
      - rpm-repo:/var/www/repo
      - ./build-repo.sh:/usr/local/bin/build-repo.sh:ro,z
    command: ["/bin/bash", "/usr/local/bin/build-repo.sh"]
    networks:
      - dokploy-network

  # Servicio B: Servidor Web Nginx (Frontend Astro + Repositorio DNF)
  web-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antigravity-web-frontend
    restart: always
    volumes:
      - rpm-repo:/usr/share/nginx/html/repo:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
    networks:
      - dokploy-network
    ports:
    - "3020:3020"
    # En Dokploy, el dominio, puerto (3020) y SSL (Let's Encrypt) se configuran 
    # directamente desde la interfaz web de Dokploy (Pestaña "Domains"), 
    # por lo que evitamos labels hardcodeados de Traefik para prevenir conflictos.

volumes:
  rpm-repo:
    name: antigravity-rpm-repo

networks:
  dokploy-network:
    external: true
