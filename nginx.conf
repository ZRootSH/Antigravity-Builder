# Configuración optimizada para Nginx - Frontend Astro + Repositorio DNF
server {
    listen 3020;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Codificación de caracteres
    charset utf-8;

    # Configuración general de seguridad y cabeceras
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Habilitar compresión GZIP
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml application/x-rpm application/xml;

    # 1. Ruta principal: Servir la landing page de Astro
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Caché agresiva para activos estáticos de Astro (JS, CSS, fuentes, imágenes)
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 2. Ruta /repo/: Servir el volumen del repositorio DNF con autoindex
    location /repo/ {
        alias /usr/share/nginx/html/repo/;
        
        # Habilitar navegación de directorios (autoindex)
        autoindex on;
        autoindex_exact_size off; # Muestra tamaños legibles (e.g., 45.2 MB en vez de bytes)
        autoindex_localtime on;   # Muestra la hora local del servidor
        
        # Tipos MIME explícitos para paquetes RPM y metadatos dnf/yum
        types {
            application/x-rpm rpm;
            application/xml xml;
            application/gzip gz;
            application/x-sqlite3 sqlite sqlite3;
            application/x-zstd zst;
        }
        default_type application/octet-stream;

        # Evitar caché en repodata/ para que dnf siempre descargue los metadatos más recientes
        location ~* /repo/.*repodata/.*$ {
            alias /usr/share/nginx/html/repo/;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # Permitir CORS en el repositorio por si se descarga mediante herramientas web o scripts
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    }

    # Páginas de error personalizadas
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
